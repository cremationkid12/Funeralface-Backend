openapi: 3.0.3
info:
  title: Everroute API
  version: 1.0.0
  description: REST API contract for Everroute backend and mobile integration.
  contact:
    name: Everroute Engineering
    email: engineering@example.com
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
tags:
  - name: Health
  - name: Auth
  - name: Settings
  - name: Staff
  - name: Assignments
  - name: Public
paths:
  /v1/health:
    get:
      tags: [Health]
      summary: Health check endpoint
      description: Returns API service health status for monitoring and smoke checks.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user context
      description: Returns identifiers from the validated JWT (user, role, organization).
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register new user account
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialsRequest'
      responses:
        '201':
          description: Account created (session may be null if email confirmation is required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '503':
          description: Auth service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialsRequest'
      responses:
        '200':
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: postAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: Refreshed session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current access token session
      operationId: postAuthLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogoutRequest'
      responses:
        '204':
          description: Logout accepted
        '400':
          $ref: '#/components/responses/BadRequestError'
  /v1/auth/password/recover:
    post:
      tags: [Auth]
      summary: Send a password reset email OTP (8 digits; Supabase hosted default)
      description: >
        Triggers Supabase sign-in OTP for an existing user (`shouldCreateUser: false`).
        Configure the Supabase email template to deliver an 8-digit code (EverRoute API validates 8 digits).
      operationId: postAuthPasswordRecover
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRecoverPasswordRequest'
      responses:
        '202':
          description: Password recovery requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRecoverPasswordResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '503':
          description: Auth service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/password/otp/verify:
    post:
      tags: [Auth]
      summary: Verify 8-digit reset code and obtain a short-lived session
      description: >
        Exchanges the emailed OTP for access and refresh tokens.
        The client then submits the new password via password/reset-complete without persisting this session until reset succeeds.
      operationId: postAuthPasswordOtpVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasswordOtpVerifyRequest'
      responses:
        '200':
          description: OTP valid; session tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          description: Auth service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/password/reset-complete:
    post:
      tags: [Auth]
      summary: Set a new password using session tokens from OTP verify or recovery link
      description: >
        Accepts access_token and refresh_token from email OTP verification or from a Supabase recovery redirect,
        updates the password, and returns a refreshed session.
      operationId: postAuthPasswordResetComplete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasswordResetCompleteRequest'
      responses:
        '200':
          description: Password updated and new session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          description: Auth service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/invites/accept:
    post:
      tags: [Auth]
      summary: Accept a pending staff invitation
      operationId: postAcceptInvite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteAcceptRequest'
      responses:
        '200':
          description: Invite accepted and membership activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteAcceptResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/staff/invite:
    post:
      tags: [Staff]
      summary: Invite staff member by email
      description: Sends an invitation email via SendGrid. Requires admin role and server-side SendGrid configuration.
      operationId: inviteStaffByEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffInviteRequest'
      responses:
        '202':
          description: Invite accepted for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffInviteResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '502':
          description: Upstream invite provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Invite service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/settings:
    get:
      tags: [Settings]
      summary: Get funeral home settings
      description: Returns the current settings configured for the authenticated organization.
      operationId: getSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Settings]
      summary: Update funeral home settings
      description: Updates funeral home settings fields for the authenticated organization.
      operationId: patchSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Updated settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/billing/subscription:
    get:
      tags: [Billing]
      summary: Get organization subscription status
      operationId: getBillingSubscription
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscription status for the authenticated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSubscription'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/billing/checkout-session:
    post:
      tags: [Billing]
      summary: Create Stripe Checkout session (admin)
      description: Starts subscription checkout with a 7-day trial at $11.99/month.
      operationId: createBillingCheckoutSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCheckoutSession'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          description: Organization already subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Billing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/billing/portal-session:
    post:
      tags: [Billing]
      summary: Create Stripe Customer Portal session (admin)
      operationId: createBillingPortalSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Billing portal URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPortalSession'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: No billing customer yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Billing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/staff:
    get:
      tags: [Staff]
      summary: List staff members
      description: Lists staff members for the authenticated organization.
      operationId: listStaff
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sort
          schema:
            type: string
            example: -created_at
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Staff list payload
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffMember'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Staff]
      summary: Create staff member
      description: Creates a new staff member record in the authenticated organization.
      operationId: createStaff
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffCreateRequest'
      responses:
        '201':
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/staff/{id}:
    patch:
      tags: [Staff]
      summary: Update staff member
      description: Updates staff member profile fields by identifier.
      operationId: patchStaffById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffUpdateRequest'
      responses:
        '200':
          description: Staff member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Staff]
      summary: Delete staff member
      description: Deletes a staff member by identifier for the authenticated organization.
      operationId: deleteStaffById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Staff member deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/staff/{id}/activate:
    post:
      tags: [Staff]
      summary: Activate staff member
      description: Marks a staff member as active (admin-only).
      operationId: activateStaffById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Staff member activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/staff/{id}/deactivate:
    post:
      tags: [Staff]
      summary: Deactivate staff member
      description: Marks a staff member as inactive (admin-only).
      operationId: deactivateStaffById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Staff member deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/assignments:
    get:
      tags: [Assignments]
      summary: List pickup assignments
      description: Returns pickup assignments visible to the authenticated organization.
      operationId: listAssignments
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sort
          schema:
            type: string
            example: -created_at
      responses:
        '200':
          description: Assignment list payload
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PickupAssignment'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Assignments]
      summary: Create pickup assignment
      description: Creates a new pickup assignment entry.
      operationId: createAssignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickupAssignment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/assignments/{id}:
    patch:
      tags: [Assignments]
      summary: Update pickup assignment
      description: Updates pickup assignment data, including status transitions.
      operationId: patchAssignmentById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentUpdateRequest'
      responses:
        '200':
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickupAssignment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/public/assignments/by-token/{token}:
    get:
      tags: [Public]
      summary: Get assignment details by family token
      description: Resolves a validated family token and returns a sanitized assignment view.
      operationId: getAssignmentByToken
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sanitized family payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyAssignmentView'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '410':
          description: Token expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/public/invites/{token}/preview:
    get:
      tags: [Public]
      summary: Preview invitation by token
      operationId: getInvitePreviewByToken
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation preview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePreviewResponse'
        '404':
          description: Invite token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthMeResponse:
      type: object
      required: [user_id, role, org_id]
      properties:
        user_id:
          type: string
        role:
          type: string
        org_id:
          type: string
    AuthCredentialsRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthSessionResponse:
      type: object
      required: [user_id, access_token, refresh_token]
      properties:
        user_id:
          type: string
          nullable: true
        access_token:
          type: string
          nullable: true
        refresh_token:
          type: string
          nullable: true
    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    AuthLogoutRequest:
      type: object
      required: [access_token]
      properties:
        access_token:
          type: string
    AuthRecoverPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    AuthRecoverPasswordResponse:
      type: object
      required: [status, email]
      properties:
        status:
          type: string
          example: recovery_requested
        email:
          type: string
          format: email
    AuthPasswordResetCompleteRequest:
      type: object
      required: [access_token, refresh_token, password]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        password:
          type: string
          minLength: 8
    AuthPasswordOtpVerifyRequest:
      type: object
      required: [email, token]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
          minLength: 8
          maxLength: 8
          pattern: '^[0-9]{8}$'
          description: Numeric 8-digit OTP from email (matches Supabase hosted mailer default).
    StaffInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    StaffInviteResponse:
      type: object
      required: [status, email, org_id]
      properties:
        status:
          type: string
          example: invited
        email:
          type: string
          format: email
        org_id:
          type: string
    InvitePreviewResponse:
      type: object
      required: [org_id, invited_email, invited_role, expires_at]
      properties:
        org_id:
          type: string
        invited_email:
          type: string
          format: email
        invited_role:
          type: string
        inviter_name:
          type: string
          nullable: true
        inviter_email:
          type: string
          format: email
          nullable: true
        expires_at:
          type: string
          format: date-time
    InviteAcceptRequest:
      type: object
      required: [invite_token]
      properties:
        invite_token:
          type: string
    InviteAcceptResponse:
      type: object
      required: [org_id, role]
      properties:
        org_id:
          type: string
        role:
          type: string
    Settings:
      type: object
      required:
        - director_name
        - director_phone
        - funeral_home_name
        - funeral_home_phone
        - funeral_home_address
      properties:
        director_name:
          type: string
        director_phone:
          type: string
        director_email:
          type: string
          nullable: true
        director_image_url:
          type: string
          nullable: true
        funeral_home_name:
          type: string
        funeral_home_phone:
          type: string
        funeral_home_address:
          type: string
        logo_url:
          type: string
          nullable: true
        default_message:
          type: string
          nullable: true
    SettingsUpdateRequest:
      type: object
      properties:
        director_name:
          type: string
        director_phone:
          type: string
        director_email:
          type: string
        director_image_url:
          type: string
        funeral_home_name:
          type: string
        funeral_home_phone:
          type: string
        funeral_home_address:
          type: string
        logo_url:
          type: string
        default_message:
          type: string
    BillingSubscription:
      type: object
      required:
        - org_id
        - status
        - plan_amount_cents
        - plan_interval
        - trial_days
        - is_subscribed
        - cancel_at_period_end
      properties:
        org_id:
          type: string
        status:
          type: string
          enum: [none, trialing, active, past_due, canceled, unpaid, incomplete]
        plan_amount_cents:
          type: integer
          example: 1199
        plan_interval:
          type: string
          example: month
        trial_days:
          type: integer
          example: 7
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
        is_subscribed:
          type: boolean
    BillingCheckoutSession:
      type: object
      required: [checkout_url, session_id]
      properties:
        checkout_url:
          type: string
          format: uri
        session_id:
          type: string
    BillingPortalSession:
      type: object
      required: [portal_url]
      properties:
        portal_url:
          type: string
          format: uri
    StaffMember:
      type: object
      required: [id, name, phone, active]
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
        active:
          type: boolean
        email:
          type: string
          nullable: true
        role:
          type: string
          example: user
        created_at:
          type: string
          format: date-time
    StaffCreateRequest:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
